<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lino · Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&family=Geist+Mono:wght@400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f2;
  --card:#ffffff;
  --card2:#fafaf8;
  --border:#e2e2dc;
  --border2:#c8c8c0;
  --text:#0d0d0c;
  --text2:#3a3a36;
  --muted:#7a7a74;
  --dim:#b8b8b0;
  --green:#15803d;
  --green-bg:#f0fdf4;
  --green-bd:#86efac;
  --red:#b91c1c;
  --red-bg:#fef2f2;
  --red-bd:#fca5a5;
  --blue:#1d4ed8;
  --r:7px;--r2:11px;--r3:15px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 18px rgba(0,0,0,.09),0 2px 5px rgba(0,0,0,.05);
  --sh3:0 8px 30px rgba(0,0,0,.10),0 3px 8px rgba(0,0,0,.06);
  --font:'Inter',sans-serif;
  --font-d:'Syne',sans-serif;
  --font-n:'Geist Mono','Courier New',monospace;  /* police chiffres */
}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:13px;line-height:1.6;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── NAV ── */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(245,245,242,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:54px;
  box-shadow:0 1px 0 rgba(0,0,0,.04);
}
.logo{
  font-family:var(--font-d);font-size:14px;font-weight:800;
  letter-spacing:.02em;color:var(--text);
  display:flex;align-items:center;gap:9px;
}
.logo-mark{
  width:27px;height:27px;background:var(--text);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.logo-mark svg{width:13px;height:13px;fill:#fff}
.tabs{display:flex;gap:1px}
.tab-btn{
  background:none;border:none;
  font-family:var(--font-d);font-size:11px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);padding:6px 15px;border-radius:20px;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text);background:rgba(0,0,0,.05)}
.tab-btn.on{background:var(--text);color:#fff;box-shadow:var(--sh)}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-time{
  font-family:var(--font-n);font-size:11px;
  color:var(--muted);letter-spacing:.02em;
}
.btn-ref{
  background:var(--card);border:1px solid var(--border2);
  color:var(--text2);font-family:var(--font);font-size:11px;font-weight:500;
  padding:6px 14px;border-radius:20px;cursor:pointer;
  transition:all .15s;box-shadow:var(--sh);
}
.btn-ref:hover{border-color:var(--text);color:var(--text);box-shadow:var(--sh2)}

/* ── PAGE ── */
.page{display:none;padding:2rem 2.5rem;max-width:1200px;margin:0 auto}
.page.on{display:block}

/* ── HERO ── */
.hero{
  padding:2.5rem 0 2rem;
  margin-bottom:2rem;
  border-bottom:2px solid var(--border);
}
.hero-lbl{
  font-family:var(--font-d);font-size:10px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;
}
.hero-val{
  /* Geist Mono pour les chiffres — propre, aligné, lisible */
  font-family:var(--font-n);
  font-size:54px;font-weight:600;
  letter-spacing:-.02em;line-height:1;
  color:var(--text);
  margin-bottom:14px;
  /* Le € reste en Syne pour le contraste */
}
.hero-val .currency{
  font-family:var(--font-d);font-size:28px;font-weight:800;
  letter-spacing:-.02em;vertical-align:super;margin-right:2px;color:var(--text2);
}
.hero-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{
  display:inline-flex;align-items:center;
  font-family:var(--font-n);font-size:11px;font-weight:500;
  padding:5px 12px;border-radius:20px;border:1px solid transparent;
  letter-spacing:.01em;
}
.bg{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.br{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.bm{background:rgba(0,0,0,.04);color:var(--muted);border-color:var(--border)}
.hero-sub{font-family:var(--font-n);font-size:11px;color:var(--muted)}

/* ── METRICS ── */
.metrics{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));
  gap:0;background:var(--border);
  border:1px solid var(--border);border-radius:var(--r2);
  overflow:hidden;margin-bottom:2rem;box-shadow:var(--sh);
}
.metric{
  background:var(--card);padding:18px 20px;
  transition:background .12s;border-right:1px solid var(--border);
}
.metric:last-child{border-right:none}
.metric:hover{background:var(--card2)}
.ml{
  font-family:var(--font-d);font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);margin-bottom:8px;
}
.mv{
  font-family:var(--font-n);font-size:19px;font-weight:500;
  letter-spacing:-.01em;color:var(--text);
}
.ms{
  font-family:var(--font-n);font-size:11px;
  color:var(--muted);margin-top:3px;
}
.mg{color:var(--green)}.mr{color:var(--red)}.mm{color:var(--muted)}

/* ── CARDS ── */
.cg2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.cg2{grid-template-columns:1fr}}
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r3);padding:22px 24px;box-shadow:var(--sh);
}
.card-hd{
  font-family:var(--font-d);font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.14em;color:var(--muted);
  margin-bottom:18px;display:flex;align-items:center;gap:10px;
}
.card-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.chart-box{position:relative;height:200px}
.pbtns{display:flex;gap:2px;margin-left:auto}
.pbtn{
  background:none;border:none;
  font-family:var(--font-n);font-size:10px;font-weight:500;
  color:var(--muted);padding:3px 9px;border-radius:10px;
  cursor:pointer;transition:all .12s;letter-spacing:.03em;
}
.pbtn:hover{color:var(--text)}.pbtn.on{background:var(--text);color:#fff}

/* ── ALLOC ── */
.alloc-item{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.alloc-lbl{
  font-family:var(--font-n);font-size:11px;font-weight:500;
  color:var(--text2);width:62px;flex-shrink:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  letter-spacing:.02em;
}
.alloc-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.alloc-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.alloc-pct{font-family:var(--font-n);font-size:10px;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.alloc-amt{font-family:var(--font-n);font-size:11px;font-weight:500;color:var(--text);width:68px;text-align:right;flex-shrink:0}

/* ── POS CARDS ── */
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:2rem}
.pos-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:18px;box-shadow:var(--sh);
  transition:all .18s cubic-bezier(.4,0,.2,1);
}
.pos-card:hover{box-shadow:var(--sh2);border-color:var(--border2);transform:translateY(-2px)}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px}
.pc-icon{
  width:38px;height:38px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-d);font-size:13px;font-weight:800;flex-shrink:0;
}
.pc-name{
  font-family:var(--font-d);font-size:13px;font-weight:700;letter-spacing:-.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:145px;margin-bottom:2px;
}
.pc-ticker{font-family:var(--font-n);font-size:10px;color:var(--muted);letter-spacing:.05em}
.pc-spark{height:36px;margin:11px 0 9px}
.pc-val{font-family:var(--font-n);font-size:18px;font-weight:500;letter-spacing:-.01em;color:var(--text)}
.pc-pv{font-family:var(--font-n);font-size:11px;font-weight:400;margin-top:3px}

/* ── TABLE ── */
.tw{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{
  background:var(--card2);
  font-family:var(--font-d);font-size:9px;text-transform:uppercase;
  letter-spacing:.12em;color:var(--muted);font-weight:700;
  padding:11px 16px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;
}
th:first-child{text-align:left}
td{
  padding:13px 16px;text-align:right;
  border-bottom:1px solid var(--border);
  font-family:var(--font-n);font-size:12px;color:var(--text);
}
td:first-child{text-align:left;font-family:var(--font)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--card2)}
tfoot td{
  background:var(--card2);border-top:1px solid var(--border2);
  font-family:var(--font-n);font-weight:500;
  padding:11px 16px;text-align:right;
}
tfoot td:first-child{text-align:left;color:var(--muted);font-weight:400;font-size:11px;font-family:var(--font)}
.tsym{font-family:var(--font-d);font-weight:700;font-size:13px;letter-spacing:.01em;color:var(--text)}
.tname{font-family:var(--font);font-size:11px;color:var(--muted);margin-top:1px}
.ci{
  background:var(--card2);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-n);font-size:12px;
  padding:5px 8px;border-radius:var(--r);width:90px;text-align:right;transition:all .15s;
}
.ci:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.del-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 7px;border-radius:var(--r);font-size:13px;transition:all .15s}
.del-btn:hover{color:var(--red);background:var(--red-bg)}
.pvb{display:inline-flex;font-family:var(--font-n);font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.pvg{background:var(--green-bg);color:var(--green)}.pvr{background:var(--red-bg);color:var(--red)}

/* ── FORMS ── */
.fc{background:var(--card);border:1px solid var(--border);border-radius:var(--r3);padding:22px 26px;margin-bottom:22px;box-shadow:var(--sh)}
.ft{font-family:var(--font-d);font-size:16px;font-weight:800;letter-spacing:-.02em;margin-bottom:18px;color:var(--text)}
.fgg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-family:var(--font-d);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.fg input,.fg select{
  background:var(--card2);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-n);font-size:13px;
  padding:9px 12px;border-radius:var(--r);transition:all .15s;
}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.fg select{font-family:var(--font)}

/* ── AUTOCOMPLETE ── */
.acw{position:relative;margin-bottom:12px}
.ac-in{
  width:100%;background:var(--card2);border:1px solid var(--border2);
  color:var(--text);font-family:var(--font);font-size:14px;
  padding:12px 15px;border-radius:var(--r2);transition:all .15s;
}
.ac-in:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.ac-in::placeholder{color:var(--dim)}
.ac-dd{
  display:none;position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:200;
  background:#fff;border:1px solid var(--border2);border-radius:var(--r2);
  box-shadow:var(--sh3);overflow:hidden;max-height:280px;overflow-y:auto;
}
.ac-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--card2)}
.ac-sym{font-family:var(--font-n);font-size:12px;font-weight:600;color:var(--text);width:78px;flex-shrink:0;letter-spacing:.04em}
.ac-name{font-size:12px;color:var(--text2);flex:1}
.ac-exch{font-family:var(--font-n);font-size:10px;color:var(--muted);background:var(--card2);padding:2px 7px;border-radius:20px;flex-shrink:0}
.sel-pill{display:none;align-items:center;gap:10px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--r);padding:9px 14px;margin-top:8px}
.sp-sym{font-family:var(--font-n);font-weight:600;font-size:12px;color:var(--green);letter-spacing:.04em}
.sp-name{font-size:12px;color:var(--text2)}

/* ── BUTTONS ── */
.btn-p{
  background:var(--text);color:#fff;border:none;
  border-radius:var(--r);padding:11px 22px;
  font-family:var(--font-d);font-size:11px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
.btn-p:hover{background:var(--text2);box-shadow:var(--sh2)}
.btn-s{
  background:#fff;border:1px solid var(--border2);
  color:var(--text2);border-radius:var(--r);padding:11px 22px;
  font-family:var(--font-d);font-size:11px;font-weight:600;letter-spacing:.05em;
  cursor:pointer;transition:all .15s;margin-left:8px;
}
.btn-s:hover{border-color:var(--text);color:var(--text)}

/* ── SECTION TITLE ── */
.sec-t{
  font-family:var(--font-d);font-size:15px;font-weight:800;
  letter-spacing:-.02em;margin:1.75rem 0 1rem;color:var(--text);
  display:flex;align-items:center;gap:12px;
}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:22px;right:22px;z-index:9999;
  background:var(--text);color:#fff;
  padding:10px 18px;border-radius:var(--r2);
  font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:.04em;
  opacity:0;transform:translateY(8px);transition:all .22s cubic-bezier(.4,0,.2,1);
  pointer-events:none;box-shadow:var(--sh3);
}
.toast.on{opacity:1;transform:translateY(0)}
.tok{background:var(--green)}.ter{background:var(--red)}

.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty-ico{font-size:28px;margin-bottom:10px;opacity:.3}


/* ── WATCH DETAIL MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(13,13,12,.6);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.on{display:flex;animation:fadeOverlay .2s ease}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.2),0 8px 20px rgba(0,0,0,.12);width:100%;max-width:860px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUpModal .22s cubic-bezier(.4,0,.2,1)}
@keyframes slideUpModal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 26px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-sym{font-family:var(--font-n);font-size:12px;font-weight:600;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.modal-name{font-family:var(--font-d);font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-bottom:8px}
.modal-price-row{display:flex;align-items:baseline;gap:10px}
.modal-price{font-family:var(--font-n);font-size:30px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.modal-close{background:rgba(0,0,0,.06);border:none;width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.modal-close:hover{background:var(--red-bg);color:var(--red)}
.modal-body{overflow-y:auto;padding:20px 26px 28px;flex:1}
.modal-periods{display:flex;gap:3px;margin-bottom:18px}
.mpbtn{background:none;border:none;font-family:var(--font-n);font-size:10px;font-weight:500;color:var(--muted);padding:4px 10px;border-radius:10px;cursor:pointer;transition:all .12s}
.mpbtn:hover{color:var(--text)}.mpbtn.on{background:var(--text);color:#fff}
.modal-chart-wrap{position:relative;height:240px;margin-bottom:22px}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
.score-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.score-label{font-family:var(--font-d);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
.score-ring-wrap{display:flex;align-items:center;gap:16px}
.score-ring{position:relative;width:72px;height:72px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg);overflow:visible}
.score-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-n);font-size:17px;font-weight:600}
.score-verdict{font-family:var(--font-d);font-size:14px;font-weight:800;letter-spacing:-.01em;margin-bottom:4px}
.score-reason{font-size:11px;color:var(--muted);line-height:1.5}
.modal-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:22px;border:1px solid var(--border)}
.mkpi{background:var(--card);padding:12px 14px}
.mkpi-l{font-family:var(--font-d);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
.mkpi-v{font-family:var(--font-n);font-size:14px;font-weight:500;color:var(--text)}
.news-hd{font-family:var(--font-d);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.news-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.news-item{padding:12px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-ititle{font-size:13px;font-weight:500;color:var(--text);line-height:1.45;text-decoration:none;display:block;margin-bottom:5px}
.news-ititle:hover{color:var(--blue)}
.news-imeta{display:flex;align-items:center;gap:8px}
.news-src{font-family:var(--font-n);font-size:10px;color:var(--muted)}
.news-date{font-family:var(--font-n);font-size:10px;color:var(--dim)}
.news-link{font-family:var(--font-d);font-size:10px;font-weight:700;color:var(--blue);text-decoration:none;letter-spacing:.03em;margin-left:auto}
.news-link:hover{text-decoration:underline}
.loading-dots{display:flex;align-items:center;gap:6px;padding:1.5rem 0;color:var(--muted);font-family:var(--font-d);font-size:11px;font-weight:600;letter-spacing:.04em}
.ld{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:ldpulse 1.2s infinite ease-in-out}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes ldpulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

function dbSearch(q){
  const s=q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  if(!s) return [];
  return DB.filter(([t,n])=>{
    const tl=t.toLowerCase(),nl=n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return tl.startsWith(s)||nl.includes(s)||nl.split(/[\s\-\/]/).some(w=>w.startsWith(s));
  }).slice(0,8);
}

// ── PRICES ─────────────────────────────────────────
const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

async function fetchY(url){
  for(const px of PROXIES){
    try{
      const r=await fetch(px(url),{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const t=await r.text();
      if(!t||t.length<20||t.trim()[0]==='<') continue;
      return JSON.parse(t);
    }catch(e){}
  }
  return null;
}

async function getPrice(ticker){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=6mo`;
  const d=await fetchY(url);
  if(!d) return null;
  const meta=d?.chart?.result?.[0]?.meta;
  if(!meta) return null;
  const closes=(d.chart.result[0].indicators?.quote?.[0]?.close||[]).filter(x=>x!=null);
  const price=meta.regularMarketPrice;
  const prev=meta.chartPreviousClose||meta.previousClose||price;
  return{
    price,chg:prev?((price-prev)/prev*100):0,
    name:meta.longName||meta.shortName||ticker,
    currency:meta.currency||'EUR',
    history:closes,
    high52:meta.fiftyTwoWeekHigh,low52:meta.fiftyTwoWeekLow,
  };
}

async function refreshAll(){
  toast('Actualisation...');
  const tickers=[...new Set([...POS.map(p=>p.ticker),...WATCH.map(w=>w.ticker)])];
  let ok=0;
  await Promise.all(tickers.map(async t=>{
    const r=await getPrice(t);
    if(!r) return;
    ok++;
    POS.forEach(p=>{if(p.ticker===t){p.price=r.price;p.history=r.history;p.name=r.name||p.name;p.currency=r.currency||p.currency;}});
    WATCH.forEach(w=>{if(w.ticker===t){w.price=r.price;w.chg=r.chg;w.history=r.history;w.name=r.name||w.name;}});
  }));
  save();renderDash();renderPosTable();renderWatchGrid();
  if(ok>0) toast(ok+' cours mis a jour','tok');
  else toast('Impossible de recuperer les cours','ter');
}

function showDD(ddId, results, cb){
  const dd=document.getElementById(ddId);
  if(!results.length){dd.style.display='none';return;}
  dd.innerHTML=results.map(([t,n,e])=>`<div class="ac-item" onclick="${cb}('${t}','${(n||'').replace(/'/g,"\'")}','${e||''}')"><span class="ac-sym">${t}</span><span class="ac-name">${n}</span><span class="ac-exch">${e||''}</span></div>`).join('');
  dd.style.display='block';
}

function acSearch(v){
  clearTimeout(acTmr);
  const dd=document.getElementById('ac-dd');
  if(!v){dd.style.display='none';return;}
  showDD('ac-dd',dbSearch(v),'acPick');
  if(v.length>=2){
    acTmr=setTimeout(async()=>{
      const url=`https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(v)}&quotesCount=6&newsCount=0&enableFuzzyQuery=true`;
      const d=await fetchY(url);
      const q=(d?.quotes||[]).filter(x=>['EQUITY','ETF','CRYPTOCURRENCY','FUTURE'].includes(x.quoteType)).slice(0,8);
      if(q.length) showDD('ac-dd',q.map(x=>[x.symbol,x.longname||x.shortname||x.symbol,x.exchDisp||x.exchange||'']),'acPick');
    },300);
  }
}

  const total=lat+realPnl;
  const cagr=calcCAGR(inv,val,POS.map(p=>p.date).sort()[0]);

  document.getElementById('h-val').innerHTML='<span class="currency">\u20AC</span>'+fmt(val);
  const pvEl=document.getElementById('h-pv');

function renderMainChart(){
  killChart('c-main');
  const canvas=document.getElementById('c-main');
  if(!canvas) return;
  if(!POS.length){
    const ctx=canvas.getContext('2d');canvas.width=canvas.parentElement.offsetWidth||600;canvas.height=200;ctx.clearRect(0,0,canvas.width,200);
    ctx.fillStyle='#c8c8c2';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('Ajoutez des positions pour voir la courbe',canvas.width/2,100);return;
  }
  // Build daily patrimoine from histories
  const hists=POS.map(p=>sliceH(p.history));
  const maxLen=Math.max(...hists.map(h=>h.length),0);
  if(maxLen<2){
    const ctx=canvas.getContext('2d');canvas.width=canvas.parentElement.offsetWidth||600;canvas.height=200;ctx.clearRect(0,0,canvas.width,200);
    ctx.fillStyle='#9a9a94';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('Cliquez Actualiser pour charger l\u2019historique',canvas.width/2,100);return;
  }
  const data=[];
  for(let i=0;i<maxLen;i++){
    let dv=0;
    POS.forEach((p,pi)=>{
      const h=hists[pi];
      const price=h.length>0?h[Math.round(i*(h.length-1)/Math.max(maxLen-1,1))]:p.price;
      dv+=(price||p.price)*p.qty*rt(p.currency||'EUR');
    });
    data.push(parseFloat(dv.toFixed(2)));
  }
  const isUp=data[data.length-1]>=data[0];
  const col=isUp?'#16a34a':'#dc2626';
  CH['c-main']=new Chart(canvas,{
    type:'line',
    data:{labels:data.map(()=>''),datasets:[{data,borderColor:col,backgroundColor:isUp?'rgba(22,163,74,0.07)':'rgba(220,38,38,0.06)',fill:true,tension:0.4,pointRadius:0,borderWidth:2}]},
    options:{...CHART_DEFAULTS,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#111',bodyColor:'#4a4a46',borderColor:'#e8e8e4',borderWidth:1,callbacks:{label:c=>' \u20AC'+fmt(c.raw)}}},
      scales:{x:{display:false},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:v=>'\u20AC'+Math.round(v),color:'#9a9a94',font:{size:11}},border:{display:false}}}}
  });
}

function renderSparklines(){
  POS.forEach(p=>{
    const c=document.getElementById('sp-'+p.id);
    if(!c) return;
    const h=sliceH(p.history).filter(x=>x!=null);
    const W=180,H=36,ctx=c.getContext('2d');
    ctx.clearRect(0,0,W,H);
    if(h.length<2){ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.strokeStyle='#e8e8e4';ctx.lineWidth=1;ctx.stroke();return;}
    const mn=Math.min(...h),mx=Math.max(...h),rng=mx-mn||1;
    const x=i=>(i/(h.length-1))*(W-2)+1;
    const y=v=>H-2-((v-mn)/rng)*(H-4);
    const col=p.price>=p.pru?'#16a34a':'#dc2626';
    ctx.beginPath();ctx.moveTo(x(0),y(h[0]));
    h.forEach((v,i)=>{if(i>0)ctx.lineTo(x(i),y(v));});
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=p.price>=p.pru?'rgba(22,163,74,0.09)':'rgba(220,38,38,0.09)';ctx.fill();
  });
}

function calcCAGR(inv,val,fd){
  if(!fd||inv<=0||val<=0) return null;
  const y=(new Date()-new Date(fd))/31557600000;
  if(y<0.05) return null;
  return(Math.pow(val/inv,1/y)-1)*100;
}

}

        <div class="score-card">
          <div class="score-label">Analyse</div>
          <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;">${a.analyse}</div>
          ${(a.positifs||[]).map(p=>`<div style="display:flex;gap:6px;font-size:11px;margin-bottom:3px;"><span style="color:var(--green);font-weight:700;">+</span><span style="color:var(--text2);">${p}</span></div>`).join('')}
          ${(a.negatifs||[]).map(p=>`<div style="display:flex;gap:6px;font-size:11px;margin-bottom:3px;"><span style="color:var(--red);font-weight:700;">−</span><span style="color:var(--text2);">${p}</span></div>`).join('')}
        </div>`;
    }catch(e){
      scoreHTML = `<div class="score-card" style="grid-column:1/-1;"><div class="score-label">Analyse</div><div style="font-size:12px;color:var(--muted);">Analyse temporairement indisponible.</div></div>`;
    }
  } else {
    scoreHTML = `<div class="score-card" style="grid-column:1/-1;"><div class="score-label">Analyse</div><div style="font-size:12px;color:var(--muted);">Clé API requise pour l'analyse.</div></div>`;
  }
  document.getElementById('m-scores').innerHTML = scoreHTML;

  // News
  const news = newsD?.news?.slice(0,6)||[];
  document.getElementById('m-news').innerHTML = news.length
    ? news.map(n=>{
        const d = n.providerPublishTime
          ? new Date(n.providerPublishTime*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})
          : '';
        return `<div class="news-item">
          <a class="news-ititle" href="${n.link}" target="_blank" rel="noopener">${n.title}</a>
          <div class="news-imeta">
            <span class="news-src">${n.publisher||''}</span>
            <span class="news-date">${d}</span>
            <a class="news-link" href="${n.link}" target="_blank" rel="noopener">↗ Lire</a>
          </div>
        </div>`;
      }).join('')
    : '<div style="color:var(--muted);font-size:12px;padding:.5rem 0;">Aucune actualité disponible.</div>';
}

function drawMChart(){
  killChart('c-modal');
  const canvas = document.getElementById('c-modal');
  if(!canvas) return;
  const h = sliceMH(mHistory).filter(x=>x!=null);
  if(h.length < 2){
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.clientWidth||700,240);
    ctx.fillStyle='#9a9a94';ctx.font='13px Inter';ctx.textAlign='center';
    ctx.fillText('Cliquez Actualiser puis rouvrez pour voir le graphique',(canvas.clientWidth||700)/2,120);
    return;
  }
  const isUp = h[h.length-1]>=h[0];
  const col  = isUp?'#16a34a':'#dc2626';
  CH['c-modal'] = new Chart(canvas,{
    type:'line',
    data:{labels:h.map(()=>''),datasets:[{
      data:h,borderColor:col,
      backgroundColor:isUp?'rgba(22,163,74,0.08)':'rgba(220,38,38,0.07)',
      fill:true,tension:0.35,pointRadius:0,borderWidth:2,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#fff',titleColor:'#0d0d0c',bodyColor:'#3a3a36',borderColor:'#e2e2dc',borderWidth:1,callbacks:{label:c=>' '+fmt(c.raw)}}
      },
      scales:{
        x:{display:false},
        y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:v=>fmt(v),color:'#7a7a74',font:{size:11}},border:{display:false}}
      }
    }
  });
}

</script>

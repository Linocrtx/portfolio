
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lino · Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;--card:#fff;--border:#e8e8e4;--border2:#d0d0ca;
  --text:#111110;--text2:#4a4a46;--muted:#9a9a94;--dim:#c8c8c2;
  --green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;
  --blue:#2563eb;
  --r:8px;--r2:12px;--r3:16px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --font:'Inter',sans-serif;--font-d:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.nav{position:sticky;top:0;z-index:100;background:rgba(248,248,246,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px}
.logo{font-family:var(--font-d);font-size:15px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.tabs{display:flex;gap:2px}
.tab-btn{background:none;border:none;font-family:var(--font);font-size:12px;font-weight:500;color:var(--muted);padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:var(--border)}
.tab-btn.on{background:var(--text);color:#fff}
.nav-r{display:flex;align-items:center;gap:8px}
.nav-time{font-size:11px;color:var(--muted)}
.btn-ref{background:var(--card);border:1px solid var(--border2);color:var(--text2);font-family:var(--font);font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.btn-ref:hover{box-shadow:var(--sh2)}
.page{display:none;padding:2rem;max-width:1200px;margin:0 auto}
.page.on{display:block}
.hero{margin-bottom:2rem}
.hero-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.hero-val{font-family:var(--font-d);font-size:52px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:10px}
.hero-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid transparent}
.bg{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.br{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.bm{background:var(--bg);color:var(--muted);border-color:var(--border)}
.hero-sub{font-size:12px;color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:2rem}
.metric{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--sh);transition:box-shadow .15s}
.metric:hover{box-shadow:var(--sh2)}
.ml{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.mv{font-family:var(--font-d);font-size:18px;font-weight:700}
.ms{font-size:11px;color:var(--muted);margin-top:2px}
.mg{color:var(--green)}.mr{color:var(--red)}.mm{color:var(--muted)}
.cg2{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.cg2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r3);padding:20px;box-shadow:var(--sh)}
.card-hd{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.chart-box{position:relative;height:200px}
.pbtns{display:flex;gap:4px}
.pbtn{background:none;border:none;font-family:var(--font);font-size:11px;font-weight:500;color:var(--muted);padding:3px 8px;border-radius:12px;cursor:pointer;transition:all .12s}
.pbtn:hover{color:var(--text)}.pbtn.on{background:var(--text);color:#fff}
.alloc-item{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.alloc-lbl{font-size:11px;font-weight:600;color:var(--text2);width:64px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alloc-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.alloc-fill{height:100%;border-radius:3px;transition:width .5s}
.alloc-pct{font-size:11px;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.alloc-amt{font-size:11px;font-weight:500;width:68px;text-align:right;flex-shrink:0}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:2rem}
.pos-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;box-shadow:var(--sh);transition:all .15s}
.pos-card:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:12px;font-weight:800;flex-shrink:0}
.pc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:145px}
.pc-ticker{font-size:10px;color:var(--muted)}
.pc-spark{height:36px;margin:10px 0}
.pc-val{font-family:var(--font-d);font-size:18px;font-weight:700}
.pc-pv{font-size:11px;font-weight:500;margin-top:2px}
.tw{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:var(--bg);font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;padding:10px 14px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{padding:12px 14px;text-align:right;border-bottom:1px solid var(--border);font-size:13px}
td:first-child{text-align:left}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
tfoot td{background:var(--bg);border-top:1px solid var(--border2);font-weight:600;padding:10px 14px;text-align:right}
tfoot td:first-child{text-align:left;color:var(--muted);font-weight:400;font-size:11px}
.tsym{font-weight:600;font-family:var(--font-d)}
.tname{font-size:11px;color:var(--muted);margin-top:1px}
.ci{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:4px 8px;border-radius:6px;width:88px;text-align:right;transition:all .15s}
.ci:focus{outline:none;border-color:var(--blue);background:#fff}
.del-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 6px;border-radius:6px;font-size:13px;transition:all .15s}
.del-btn:hover{color:var(--red);background:var(--red-bg)}
.pvb{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.pvg{background:var(--green-bg);color:var(--green)}.pvr{background:var(--red-bg);color:var(--red)}
.fc{background:var(--card);border:1px solid var(--border);border-radius:var(--r3);padding:20px;margin-bottom:20px;box-shadow:var(--sh)}
.ft{font-family:var(--font-d);font-size:15px;font-weight:700;margin-bottom:16px;letter-spacing:-.01em}
.fgg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.fg input,.fg select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 11px;border-radius:var(--r);transition:all .15s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.acw{position:relative;margin-bottom:12px}
.ac-in{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:14px;padding:11px 14px;border-radius:var(--r2);transition:all .15s}
.ac-in:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.ac-in::placeholder{color:var(--dim)}
.ac-dd{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:#fff;border:1px solid var(--border2);border-radius:var(--r2);box-shadow:var(--sh2);overflow:hidden;max-height:260px;overflow-y:auto}
.ac-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--bg)}
.ac-sym{font-family:var(--font-d);font-size:13px;font-weight:700;width:80px;flex-shrink:0}
.ac-name{font-size:12px;color:var(--text2);flex:1}
.ac-exch{font-size:10px;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:20px;flex-shrink:0}
.sel-pill{display:none;align-items:center;gap:10px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--r);padding:8px 14px;margin-top:8px}
.sp-sym{font-weight:700;font-size:13px;color:var(--green);font-family:var(--font-d)}
.sp-name{font-size:12px;color:var(--text2)}
.btn-p{background:var(--text);color:#fff;border:none;border-radius:var(--r);padding:10px 20px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p:hover{background:#2a2a28;box-shadow:var(--sh2)}
.btn-s{background:#fff;border:1px solid var(--border2);color:var(--text2);border-radius:var(--r);padding:10px 20px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;margin-left:8px}
.btn-s:hover{border-color:var(--border);box-shadow:var(--sh)}
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--r2);font-size:12px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;box-shadow:var(--sh2)}
.toast.on{opacity:1;transform:translateY(0)}.tok{background:var(--green)}.ter{background:var(--red)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-ico{font-size:32px;margin-bottom:10px;opacity:.3}
.sec-t{font-family:var(--font-d);font-size:16px;font-weight:700;letter-spacing:-.02em;margin:1.5rem 0 1rem}
</style>
</head>
<body>
<nav class="nav">
  <div class="logo"><span class="logo-dot"></span>Lino &middot; Portfolio</div>
  <div class="tabs">
    <button class="tab-btn on" onclick="goPage('dashboard',this)">Dashboard</button>
    <button class="tab-btn" onclick="goPage('achats',this)">Mes achats</button>
    <button class="tab-btn" onclick="goPage('ventes',this)">Mes ventes</button>
    <button class="tab-btn" onclick="goPage('watch',this)">Surveillance</button>
  </div>
  <div class="nav-r">
    <span class="nav-time" id="nav-time"></span>
    <button class="btn-ref" onclick="refreshAll()">&#8635; Actualiser</button>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="page on" id="page-dashboard">
  <div class="hero">
    <div class="hero-lbl">Patrimoine financier</div>
    <div class="hero-val" id="h-val">&#8364;0.00</div>
    <div class="hero-row">
      <span class="badge bm" id="h-pv">+&#8364;0.00</span>
      <span class="badge bm" id="h-pct">+0.00%</span>
      <span class="hero-sub" id="h-since"></span>
    </div>
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="card" style="margin-bottom:16px;">
    <div class="card-hd">
      <span>Evolution du patrimoine</span>
      <div class="pbtns">
        <button class="pbtn" onclick="setPer('1W',this)">1S</button>
        <button class="pbtn on" onclick="setPer('1M',this)">1M</button>
        <button class="pbtn" onclick="setPer('3M',this)">3M</button>
        <button class="pbtn" onclick="setPer('6M',this)">6M</button>
        <button class="pbtn" onclick="setPer('1Y',this)">1A</button>
      </div>
    </div>
    <div class="chart-box"><canvas id="c-main"></canvas></div>
  </div>
  <div class="sec-t" id="pos-title"></div>
  <div class="pos-grid" id="pos-cards"></div>
  <div class="cg2">
    <div class="card"><div class="card-hd">Repartition</div><div id="alloc-bars"></div></div>
    <div class="card"><div class="card-hd">PV/MV realisees cumulees</div><div class="chart-box"><canvas id="c-pnl"></canvas></div></div>
  </div>
</div>

<!-- ACHATS -->
<div class="page" id="page-achats">
  <div class="fc">
    <div class="ft">Enregistrer un achat</div>
    <div class="acw">
      <input id="ac-in" class="ac-in" placeholder="Cherche une action, ETF, crypto... ex: Air Liquide, Apple, Nintendo" autocomplete="off" oninput="acSearch(this.value)">
      <div class="ac-dd" id="ac-dd"></div>
      <div class="sel-pill" id="ac-pill">
        <span class="sp-sym" id="ac-sym"></span>
        <span class="sp-name" id="ac-nm"></span>
        <span style="font-size:11px;color:var(--green);font-weight:600;margin-left:auto;">&#10003; Selectionne</span>
        <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px;" onclick="clearAc()">&#10005;</button>
      </div>
    </div>
    <div class="fgg">
      <div class="fg"><label>Ticker</label><input id="f-t" placeholder="Auto"></div>
      <div class="fg"><label>Nom</label><input id="f-n" placeholder="Auto"></div>
      <div class="fg"><label>Date d'achat</label><input id="f-d" type="date"></div>
      <div class="fg"><label>PRU (prix achat)</label><input id="f-p" type="number" placeholder="0.00" step="0.01" min="0"></div>
      <div class="fg"><label>Quantite</label><input id="f-q" type="number" placeholder="1" step="any" min="0"></div>
      <div class="fg"><label>Devise</label><select id="f-c"><option value="EUR">EUR</option><option value="USD">USD</option></select></div>
    </div>
    <button class="btn-p" onclick="addPos()">+ Enregistrer l'achat</button>
  </div>
  <div class="sec-t">Positions ouvertes</div>
  <div class="tw" id="pos-tbl"></div>
</div>

<!-- VENTES -->
<div class="page" id="page-ventes">
  <div class="fc">
    <div class="ft">Enregistrer une vente</div>
    <div class="fgg">
      <div class="fg"><label>Ticker</label><input id="s-t" placeholder="ex: AI.PA"></div>
      <div class="fg"><label>Nom</label><input id="s-n" placeholder="ex: Air Liquide"></div>
      <div class="fg"><label>Date de vente</label><input id="s-d" type="date"></div>
      <div class="fg"><label>PRU d'achat</label><input id="s-p" type="number" placeholder="0.00" step="0.01"></div>
      <div class="fg"><label>Prix de vente</label><input id="s-v" type="number" placeholder="0.00" step="0.01"></div>
      <div class="fg"><label>Quantite</label><input id="s-q" type="number" placeholder="1" step="any"></div>
      <div class="fg"><label>Devise</label><select id="s-c"><option value="EUR">EUR</option><option value="USD">USD</option></select></div>
    </div>
    <button class="btn-p" onclick="addSale()">+ Enregistrer la vente</button>
  </div>
  <div class="sec-t">Historique des ventes</div>
  <div class="tw" id="sale-tbl"></div>
</div>

<!-- SURVEILLANCE -->
<div class="page" id="page-watch">
  <div class="fc">
    <div class="ft">Surveiller une valeur</div>
    <div class="acw">
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="wac-in" class="ac-in" placeholder="Cherche une valeur..." autocomplete="off" oninput="wacSearch(this.value)" style="flex:1;">
        <button class="btn-p" onclick="addWatch()">+ Surveiller</button>
      </div>
      <div class="ac-dd" id="wac-dd"></div>
      <div class="sel-pill" id="wac-pill" style="margin-top:8px;">
        <span class="sp-sym" id="wac-sym"></span>
        <span class="sp-name" id="wac-nm"></span>
        <span style="font-size:11px;color:var(--green);font-weight:600;margin-left:auto;">&#10003; Selectionne</span>
        <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px;" onclick="clearWac()">&#10005;</button>
      </div>
    </div>
  </div>
  <div class="pos-grid" id="watch-grid"></div>
</div>

<div class="toast" id="toast"></div>

function dbSearch(q){
  const s=q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  if(!s) return [];
  return DB.filter(([t,n])=>{
    const tl=t.toLowerCase(),nl=n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    return tl.startsWith(s)||nl.includes(s)||nl.split(/[\s\-\/]/).some(w=>w.startsWith(s));
  }).slice(0,8);
}

// ── PRICES ─────────────────────────────────────────
const PROXIES=[
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

async function fetchY(url){
  for(const px of PROXIES){
    try{
      const r=await fetch(px(url),{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const t=await r.text();
      if(!t||t.length<20||t.trim()[0]==='<') continue;
      return JSON.parse(t);
    }catch(e){}
  }
  return null;
}

async function getPrice(ticker){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=6mo`;
  const d=await fetchY(url);
  if(!d) return null;
  const meta=d?.chart?.result?.[0]?.meta;
  if(!meta) return null;
  const closes=(d.chart.result[0].indicators?.quote?.[0]?.close||[]).filter(x=>x!=null);
  const price=meta.regularMarketPrice;
  const prev=meta.chartPreviousClose||meta.previousClose||price;
  return{
    price,chg:prev?((price-prev)/prev*100):0,
    name:meta.longName||meta.shortName||ticker,
    currency:meta.currency||'EUR',
    history:closes,
    high52:meta.fiftyTwoWeekHigh,low52:meta.fiftyTwoWeekLow,
  };
}

async function refreshAll(){
  toast('Actualisation...');
  const tickers=[...new Set([...POS.map(p=>p.ticker),...WATCH.map(w=>w.ticker)])];
  let ok=0;
  await Promise.all(tickers.map(async t=>{
    const r=await getPrice(t);
    if(!r) return;
    ok++;
    POS.forEach(p=>{if(p.ticker===t){p.price=r.price;p.history=r.history;p.name=r.name||p.name;p.currency=r.currency||p.currency;}});
    WATCH.forEach(w=>{if(w.ticker===t){w.price=r.price;w.chg=r.chg;w.history=r.history;w.name=r.name||w.name;}});
  }));
  save();renderDash();renderPosTable();renderWatchGrid();
  if(ok>0) toast(ok+' cours mis a jour','tok');
  else toast('Impossible de recuperer les cours','ter');
}

function renderDash(){

  POS.forEach(p=>{const r=rt(p.currency||'EUR');inv+=p.pru*p.qty*r;val+=p.price*p.qty*r;});
  const lat=val-inv,latP=inv>0?(lat/inv)*100:0;
  const realPnl=SALES.reduce((s,x)=>s+x.pnl*rt(x.currency||'EUR'),0);
  const total=lat+realPnl;
  const cagr=calcCAGR(inv,val,POS.map(p=>p.date).sort()[0]);

  document.getElementById('h-val').textContent='\u20AC'+fmt(val);
  const pvEl=document.getElementById('h-pv');
  pvEl.textContent=(lat>=0?'+\u20AC':'-\u20AC')+fmt(Math.abs(lat));

  pctEl.className='badge '+(latP>=0?'bg':'br');

  document.getElementById('metrics').innerHTML=`

    <div class="metric"><div class="ml">Valorisation</div><div class="mv">\u20AC${fmt(val)}</div></div>
    <div class="metric"><div class="ml">PV/MV latentes</div><div class="mv ${cl(lat)}">${sg(lat)}\u20AC${fmt(Math.abs(lat))}</div><div class="ms ${cl(latP)}">${sg(latP)}${fmt(Math.abs(latP))}%</div></div>
    <div class="metric"><div class="ml">PV/MV realisees</div><div class="mv ${cl(realPnl)}">${sg(realPnl)}\u20AC${fmt(Math.abs(realPnl))}</div></div>
    <div class="metric"><div class="ml">P&L total</div><div class="mv ${cl(total)}">${sg(total)}\u20AC${fmt(Math.abs(total))}</div></div>
    ${cagr!==null?`<div class="metric"><div class="ml">CAGR</div><div class="mv ${cl(cagr)}">${sg(cagr)}${fmt(Math.abs(cagr))}%</div></div>`:''}

function renderMainChart(){
  killChart('c-main');
  const canvas=document.getElementById('c-main');
  if(!canvas) return;
  if(!POS.length){
    const ctx=canvas.getContext('2d');canvas.width=canvas.parentElement.offsetWidth||600;canvas.height=200;ctx.clearRect(0,0,canvas.width,200);
    ctx.fillStyle='#c8c8c2';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('Ajoutez des positions pour voir la courbe',canvas.width/2,100);return;
  }
  // Build daily patrimoine from histories
  const hists=POS.map(p=>sliceH(p.history));
  const maxLen=Math.max(...hists.map(h=>h.length),0);
  if(maxLen<2){
    const ctx=canvas.getContext('2d');canvas.width=canvas.parentElement.offsetWidth||600;canvas.height=200;ctx.clearRect(0,0,canvas.width,200);
    ctx.fillStyle='#9a9a94';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('Cliquez Actualiser pour charger l\u2019historique',canvas.width/2,100);return;
  }
  const data=[];
  for(let i=0;i<maxLen;i++){
    let dv=0;
    POS.forEach((p,pi)=>{
      const h=hists[pi];
      const price=h.length>0?h[Math.round(i*(h.length-1)/Math.max(maxLen-1,1))]:p.price;
      dv+=(price||p.price)*p.qty*rt(p.currency||'EUR');
    });
    data.push(parseFloat(dv.toFixed(2)));
  }
  const isUp=data[data.length-1]>=data[0];
  const col=isUp?'#16a34a':'#dc2626';
  CH['c-main']=new Chart(canvas,{
    type:'line',
    data:{labels:data.map(()=>''),datasets:[{data,borderColor:col,backgroundColor:isUp?'rgba(22,163,74,0.07)':'rgba(220,38,38,0.06)',fill:true,tension:0.4,pointRadius:0,borderWidth:2}]},
    options:{...CHART_DEFAULTS,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#111',bodyColor:'#4a4a46',borderColor:'#e8e8e4',borderWidth:1,callbacks:{label:c=>' \u20AC'+fmt(c.raw)}}},
      scales:{x:{display:false},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:v=>'\u20AC'+Math.round(v),color:'#9a9a94',font:{size:11}},border:{display:false}}}}
  });
}

function renderSparklines(){
  POS.forEach(p=>{
    const c=document.getElementById('sp-'+p.id);
    if(!c) return;
    const h=sliceH(p.history).filter(x=>x!=null);
    const W=180,H=36,ctx=c.getContext('2d');
    ctx.clearRect(0,0,W,H);
    if(h.length<2){ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.strokeStyle='#e8e8e4';ctx.lineWidth=1;ctx.stroke();return;}
    const mn=Math.min(...h),mx=Math.max(...h),rng=mx-mn||1;
    const x=i=>(i/(h.length-1))*(W-2)+1;
    const y=v=>H-2-((v-mn)/rng)*(H-4);
    const col=p.price>=p.pru?'#16a34a':'#dc2626';
    ctx.beginPath();ctx.moveTo(x(0),y(h[0]));
    h.forEach((v,i)=>{if(i>0)ctx.lineTo(x(i),y(v));});
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=p.price>=p.pru?'rgba(22,163,74,0.09)':'rgba(220,38,38,0.09)';ctx.fill();
  });
}

  SALES.forEach(s=>{
    tot+=s.pnl*rt(s.currency||'EUR');const ss=sy(s.currency||'EUR');const tax=s.pnl>0?s.pnl*0.3:0;
    html+=`<tr><td><div class="tsym">${s.ticker}</div><div class="tname">${s.name}</div></td><td>${s.date}</td><td>${ss}${fmt(s.pru)}</td><td>${ss}${fmt(s.sell)}</td><td>${s.qty}</td><td><span class="pvb ${s.pnl>=0?'pvg':'pvr'}">${sg(s.pnl)}${ss}${fmt(Math.abs(s.pnl))}</span></td><td style="color:var(--muted);font-size:11px;">${tax>0?'-\u20AC'+fmt(tax):'\u2014'}</td><td><button class="del-btn" onclick="delSale(${s.id})">&#10005;</button></td></tr>`;
  });
  html+=`</tbody><tfoot><tr><td>Total PV/MV</td><td colspan="4"></td><td style="text-align:right;" class="${cl(tot)}">${sg(tot)}\u20AC${fmt(Math.abs(tot))}</td><td></td><td></td></tr></tfoot></table>`;
  el.innerHTML=html;
}

function renderWatchGrid(){
  const el=document.getElementById('watch-grid');
  if(!el) return;
  if(!WATCH.length){el.innerHTML='<div class="empty" style="grid-column:1/-1;"><div class="empty-ico">&#128065;</div><div style="font-size:14px;font-weight:600;color:var(--text2);margin-bottom:6px;">Aucune valeur surveillee</div></div>';return;}
  el.innerHTML=WATCH.map((w,i)=>{
    const chgBg=w.chg>0?'var(--green-bg)':w.chg<0?'var(--red-bg)':'var(--bg)';
    const chgFg=w.chg>0?'var(--green)':w.chg<0?'var(--red)':'var(--muted)';
    const chgStr=w.chg!=null?(sg(w.chg)+fmt(Math.abs(w.chg))+'%'):'\u2014';
    const cc=CC[i%CC.length];
    const init=w.ticker.replace(/\.[A-Z]+$/,'').slice(0,2).toUpperCase();
    return`<div class="pos-card">
      <div class="pc-top"><div class="pc-icon" style="background:${cc.bg};color:${cc.fg};">${init}</div>
      <div style="display:flex;gap:6px;align-items:center;"><span class="badge" style="background:${chgBg};color:${chgFg};border-color:transparent;">${chgStr}</span><button class="del-btn" onclick="delWatch(${w.id})">&#10005;</button></div></div>
      <div class="pc-name">${w.name}</div><div class="pc-ticker">${w.ticker}</div>
      <div class="pc-spark"><canvas id="wsp-${w.id}" width="180" height="36"></canvas></div>
      <div class="pc-val">${w.price>0?fmt(w.price):'\u2014'}</div>
    </div>`;
  }).join('');
  requestAnimationFrame(()=>{
    WATCH.forEach(w=>{
      const c=document.getElementById('wsp-'+w.id);
      if(!c) return;
      const h=sliceH(w.history).filter(x=>x!=null);
      const W=180,H=36,ctx=c.getContext('2d');ctx.clearRect(0,0,W,H);
      if(h.length<2){ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.strokeStyle='#e8e8e4';ctx.lineWidth=1;ctx.stroke();return;}
      const mn=Math.min(...h),mx=Math.max(...h),rng=mx-mn||1;
      const x=i=>(i/(h.length-1))*(W-2)+1;const y=v=>H-2-((v-mn)/rng)*(H-4);
      const col=w.chg>=0?'#16a34a':'#dc2626';
      ctx.beginPath();ctx.moveTo(x(0),y(h[0]));h.forEach((v,i)=>{if(i>0)ctx.lineTo(x(i),y(v));});
      ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
      ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
      ctx.fillStyle=w.chg>=0?'rgba(22,163,74,0.09)':'rgba(220,38,38,0.09)';ctx.fill();
    });
  });
}

// ── HELPERS ────────────────────────────────────────
function calcCAGR(inv,val,fd){
  if(!fd||inv<=0||val<=0) return null;
  const y=(new Date()-new Date(fd))/31557600000;
  if(y<0.05) return null;
  return(Math.pow(val/inv,1/y)-1)*100;
}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast on '+(type||'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3000);
}

function goPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  if(btn)btn.classList.add('on');
  if(id==='dashboard')renderDash();
  if(id==='achats')renderPosTable();
  if(id==='ventes')renderSaleTable();
  if(id==='watch')renderWatchGrid();
}

setInterval(()=>{
  const n=new Date();
  document.getElementById('nav-time').textContent=n.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})+' \u00B7 '+n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
},1000);

// ── INIT ───────────────────────────────────────────
renderDash();
if(POS.length||WATCH.length) setTimeout(refreshAll,400);
</script>

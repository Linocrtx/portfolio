
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lino · Portfolio</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>

/* ── Finary uses Inter exclusively, nothing else ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Finary palette — blanc pur, gris très doux, accents orange/vert */
  --bg:       #f9f9f9;
  --card:     #ffffff;
  --card2:    #f5f5f5;
  --border:   #ebebeb;
  --border2:  #d8d8d8;

  --text:     #1a1a1a;   /* quasi-noir, pas full black */
  --text2:    #555555;
  --muted:    #888888;
  --dim:      #bbbbbb;

  --green:    #00875a;   /* vert Finary */
  --green-bg: #e6f5f0;
  --green-bd: #b3ddd1;

  --red:      #d93025;   /* rouge Finary */
  --red-bg:   #fdf0ef;
  --red-bd:   #f5b8b5;

  --blue:     #1a56db;

  --r:  6px;
  --r2: 10px;
  --r3: 14px;

  --sh:  0 1px 4px rgba(0,0,0,.06);
  --sh2: 0 4px 16px rgba(0,0,0,.08);
  --sh3: 0 8px 32px rgba(0,0,0,.10);

  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:'cv02','cv03','cv04','cv11'; /* Inter optical features */
}

/* ── scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ════════════════════════════════
   NAV — like Finary's top bar
   ════════════════════════════════ */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:56px;
}
.logo{
  display:flex;align-items:center;gap:8px;
  font-size:15px;font-weight:700;
  color:var(--text);letter-spacing:-.3px;
}
.logo-mark{
  width:28px;height:28px;background:var(--text);
  border-radius:7px;display:flex;align-items:center;justify-content:center;
}
.logo-mark svg{width:14px;height:14px;fill:#fff}

.tabs{display:flex;gap:1px}
.tab-btn{
  background:none;border:none;
  font-family:var(--font);font-size:13px;font-weight:500;
  color:var(--muted);
  padding:7px 16px;border-radius:8px;
  cursor:pointer;transition:all .12s;
}
.tab-btn:hover{color:var(--text);background:var(--card2)}
.tab-btn.on{color:var(--text);background:var(--card2);font-weight:600}

.nav-r{display:flex;align-items:center;gap:10px}
.nav-time{font-size:12px;color:var(--muted);font-weight:400}
.btn-ref{
  background:var(--card);border:1px solid var(--border2);
  color:var(--text2);font-family:var(--font);font-size:12px;font-weight:500;
  padding:6px 14px;border-radius:8px;
  cursor:pointer;transition:all .12s;
}
.btn-ref:hover{border-color:var(--text);color:var(--text)}

/* ════════════════════════════════
   PAGE
   ════════════════════════════════ */
.page{display:none;padding:2rem 2.5rem;max-width:1200px;margin:0 auto}
.page.on{display:block}

/* ════════════════════════════════
   HERO — "Patrimoine financier" style Finary
   ════════════════════════════════ */
.hero{padding:2rem 0 1.75rem;margin-bottom:1.75rem}
.hero-lbl{
  font-size:12px;font-weight:500;
  color:var(--muted);
  margin-bottom:6px;letter-spacing:.01em;
}
.hero-val{
  /* Finary: Inter 400 ou 500, très grande, pas bold */
  font-size:46px;font-weight:300;
  letter-spacing:-1.5px;line-height:1;
  color:var(--text);
  margin-bottom:10px;
}
.hero-val .cur{
  font-size:28px;font-weight:400;
  letter-spacing:-.5px;
  color:var(--text2);
  margin-left:4px;
}
.hero-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.badge{
  display:inline-flex;align-items:center;
  font-size:12px;font-weight:500;
  padding:3px 10px;border-radius:20px;
  border:1px solid transparent;
  letter-spacing:.01em;
}
.bg{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.br{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.bm{background:var(--card2);color:var(--muted);border-color:var(--border)}
.hero-sub{font-size:12px;color:var(--muted)}

/* ════════════════════════════════
   METRICS STRIP — chiffres clés
   ════════════════════════════════ */
.metrics{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:12px;
  margin-bottom:1.75rem;
}
.metric{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:16px 18px;
  box-shadow:var(--sh);
  transition:box-shadow .12s;
}
.metric:hover{box-shadow:var(--sh2)}
.ml{
  font-size:11px;font-weight:500;
  color:var(--muted);
  margin-bottom:6px;letter-spacing:.01em;
}
.mv{
  font-size:20px;font-weight:400;
  letter-spacing:-.5px;
  color:var(--text);
}
.ms{font-size:11px;color:var(--muted);margin-top:2px}
.mg{color:var(--green)}.mr{color:var(--red)}.mm{color:var(--muted)}

/* ════════════════════════════════
   CARDS
   ════════════════════════════════ */
.cg2{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.cg2{grid-template-columns:1fr}}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r3);
  padding:20px 22px;
  box-shadow:var(--sh);
}
.card-hd{
  font-size:11px;font-weight:600;
  color:var(--muted);
  letter-spacing:.04em;text-transform:uppercase;
  margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.card-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.chart-box{position:relative;height:200px}

/* Period buttons — same as Finary */
.pbtns{display:flex;gap:2px;margin-left:auto}
.pbtn{
  background:none;border:none;
  font-family:var(--font);font-size:11px;font-weight:500;
  color:var(--muted);padding:4px 9px;border-radius:6px;
  cursor:pointer;transition:all .12s;
}
.pbtn:hover{color:var(--text)}.pbtn.on{background:var(--text);color:#fff}

/* ════════════════════════════════
   ALLOC BARS
   ════════════════════════════════ */
.alloc-item{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.alloc-lbl{font-size:11px;font-weight:500;color:var(--text2);width:60px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alloc-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.alloc-fill{height:100%;border-radius:2px;transition:width .5s ease}
.alloc-pct{font-size:11px;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.alloc-amt{font-size:11px;font-weight:500;color:var(--text);width:66px;text-align:right;flex-shrink:0}

/* ════════════════════════════════
   POSITION CARDS — style Finary "Ma performance"
   ════════════════════════════════ */
.pos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(195px,1fr));
  gap:10px;margin-bottom:2rem;
}
.pos-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:16px;
  box-shadow:var(--sh);transition:all .15s;
}
.pos-card:hover{box-shadow:var(--sh2);border-color:var(--border2);transform:translateY(-1px)}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pc-icon{
  width:36px;height:36px;border-radius:50%;   /* Finary uses circle icons */
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.pc-name{
  font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:148px;
  margin-bottom:1px;color:var(--text);
}
.pc-ticker{font-size:11px;color:var(--muted);font-weight:400}
.pc-spark{height:36px;margin:10px 0 8px}
/* Finary: valeur en gras, PV en couleur + petit */
.pc-val{
  font-size:18px;font-weight:500;
  letter-spacing:-.4px;color:var(--text);
}
.pc-pv{font-size:11px;font-weight:500;margin-top:2px}

/* ════════════════════════════════
   TABLE
   ════════════════════════════════ */
.tw{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{
  background:var(--card2);
  font-size:11px;font-weight:600;
  color:var(--muted);letter-spacing:.03em;
  padding:11px 16px;text-align:right;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
th:first-child{text-align:left}
td{
  padding:13px 16px;text-align:right;
  border-bottom:1px solid var(--border);
  font-size:13px;color:var(--text);font-weight:400;
}
td:first-child{text-align:left}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--card2)}
tfoot td{
  background:var(--card2);border-top:1px solid var(--border2);
  font-weight:600;padding:11px 16px;text-align:right;font-size:13px;
}
tfoot td:first-child{text-align:left;color:var(--muted);font-weight:400;font-size:11px}
.tsym{font-weight:600;font-size:13px;color:var(--text)}
.tname{font-size:11px;color:var(--muted);margin-top:1px;font-weight:400}
.ci{
  background:var(--card2);border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:13px;font-weight:400;
  padding:5px 8px;border-radius:6px;width:90px;text-align:right;transition:all .12s;
}
.ci:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.del-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 6px;border-radius:6px;font-size:12px;transition:all .12s}
.del-btn:hover{color:var(--red);background:var(--red-bg)}
.pvb{display:inline-flex;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.pvg{background:var(--green-bg);color:var(--green)}
.pvr{background:var(--red-bg);color:var(--red)}

/* ════════════════════════════════
   FORMS
   ════════════════════════════════ */
.fc{background:var(--card);border:1px solid var(--border);border-radius:var(--r3);padding:22px 24px;margin-bottom:20px;box-shadow:var(--sh)}
.ft{font-size:16px;font-weight:600;letter-spacing:-.2px;margin-bottom:18px;color:var(--text)}
.fgg{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.02em}
.fg input,.fg select{
  background:var(--card2);border:1px solid var(--border);
  color:var(--text);font-family:var(--font);font-size:13px;font-weight:400;
  padding:9px 11px;border-radius:var(--r);transition:all .12s;
}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,.1)}

/* ════════════════════════════════
   AUTOCOMPLETE
   ════════════════════════════════ */
.acw{position:relative;margin-bottom:12px}
.ac-in{
  width:100%;background:var(--card2);border:1px solid var(--border2);
  color:var(--text);font-family:var(--font);font-size:14px;font-weight:400;
  padding:11px 14px;border-radius:var(--r2);transition:all .12s;
}
.ac-in:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.ac-in::placeholder{color:var(--dim)}
.ac-dd{
  display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;
  background:#fff;border:1px solid var(--border2);border-radius:var(--r2);
  box-shadow:var(--sh3);overflow:hidden;max-height:280px;overflow-y:auto;
}
.ac-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover{background:var(--card2)}
.ac-sym{font-size:12px;font-weight:600;color:var(--text);width:76px;flex-shrink:0}
.ac-name{font-size:12px;color:var(--text2);flex:1}
.ac-exch{font-size:11px;color:var(--muted);background:var(--card2);padding:2px 6px;border-radius:20px;flex-shrink:0}
.sel-pill{display:none;align-items:center;gap:10px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--r);padding:9px 14px;margin-top:8px}
.sp-sym{font-weight:600;font-size:12px;color:var(--green)}
.sp-name{font-size:12px;color:var(--text2)}

/* ════════════════════════════════
   BUTTONS
   ════════════════════════════════ */
.btn-p{
  background:var(--text);color:#fff;border:none;
  border-radius:var(--r);padding:10px 20px;
  font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .12s;
}
.btn-p:hover{opacity:.88}
.btn-s{
  background:#fff;border:1px solid var(--border2);
  color:var(--text2);border-radius:var(--r);padding:10px 20px;
  font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .12s;margin-left:8px;
}
.btn-s:hover{border-color:var(--text);color:var(--text)}

/* ════════════════════════════════
   SECTION TITLE
   ════════════════════════════════ */
.sec-t{
  font-size:16px;font-weight:600;letter-spacing:-.2px;
  margin:1.75rem 0 1rem;color:var(--text);
  display:flex;align-items:center;gap:12px;
}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}

/* ════════════════════════════════
   TOAST
   ════════════════════════════════ */
.toast{
  position:fixed;bottom:20px;right:20px;z-index:9999;
  background:var(--text);color:#fff;
  padding:10px 18px;border-radius:var(--r2);
  font-size:13px;font-weight:500;
  opacity:0;transform:translateY(8px);
  transition:all .2s ease;pointer-events:none;
  box-shadow:var(--sh3);
}
.toast.on{opacity:1;transform:translateY(0)}
.tok{background:var(--green)}.ter{background:var(--red)}

.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty-ico{font-size:26px;margin-bottom:10px;opacity:.3}

/* ════════════════════════════════
   MODAL
   ════════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(26,26,26,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1.5rem}
.modal-overlay.on{display:flex;animation:fadeO .18s ease}
@keyframes fadeO{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--sh3);width:100%;max-width:840px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;animation:slideU .2s cubic-bezier(.4,0,.2,1)}
@keyframes slideU{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-sym{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:3px;letter-spacing:.04em;font-family:var(--font)}
.modal-name{font-size:20px;font-weight:600;letter-spacing:-.3px;color:var(--text);margin-bottom:8px;font-family:var(--font)}
.modal-price-row{display:flex;align-items:baseline;gap:10px}
.modal-price{font-size:28px;font-weight:400;letter-spacing:-.8px;color:var(--text)}
.modal-close{background:var(--card2);border:1px solid var(--border);width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.modal-close:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.modal-body{overflow-y:auto;padding:20px 24px 26px;flex:1}
.modal-periods{display:flex;gap:2px;margin-bottom:16px}
.mpbtn{background:none;border:none;font-family:var(--font);font-size:11px;font-weight:500;color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .12s}
.mpbtn:hover{color:var(--text)}.mpbtn.on{background:var(--text);color:#fff}
.modal-chart-wrap{position:relative;height:230px;margin-bottom:20px}
.modal-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:20px;border:1px solid var(--border);box-shadow:var(--sh)}
.mkpi{background:var(--card);padding:14px 16px;border-right:1px solid var(--border)}.mkpi:last-child{border-right:none}
.mkpi-l{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.03em;margin-bottom:5px;text-transform:uppercase}
.mkpi-v{font-size:14px;font-weight:500;color:var(--text);letter-spacing:-.2px}
.news-hd{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.news-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.news-item{padding:11px 0;border-bottom:1px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-ititle{font-size:13px;font-weight:500;color:var(--text);line-height:1.45;text-decoration:none;display:block;margin-bottom:5px;transition:color .1s}
.news-ititle:hover{color:var(--blue)}
.news-imeta{display:flex;align-items:center;gap:8px}
.news-src{font-size:11px;color:var(--muted);font-weight:400}
.news-date{font-size:11px;color:var(--dim)}
.news-link{font-size:11px;font-weight:500;color:var(--blue);text-decoration:none;margin-left:auto}
.news-link:hover{text-decoration:underline}
.loading-dots{display:flex;align-items:center;gap:5px;padding:1.25rem 0;color:var(--muted);font-size:12px;font-weight:400}
.ld{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:ldp 1.2s infinite ease-in-out}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes ldp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}


.pc-icon-logo{
  background:#fff !important;
  border:1px solid var(--border);
  padding:4px;
  display:flex;align-items:center;justify-content:center;
}
.pc-icon-logo img{
  width:26px;height:26px;
  object-fit:contain;border-radius:4px;
  display:block;
}
.pc-icon{
  font-size:12px;font-weight:700;
  letter-spacing:-.02em;
}

/* ── Logo icons ── */
.pc-logo{
  background:#fff !important;
  border:1px solid var(--border) !important;
  color:inherit !important;
  padding:5px !important;
}
.pc-logo img{
  width:26px;height:26px;
  object-fit:contain;border-radius:3px;
  display:block;
}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo"><div class="logo-mark"><svg viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg"><path d="M2 11L7 3L12 11H9.5L7 6.5L4.5 11H2Z"/></svg></div>Lino &middot; Portfolio</div>
  <div class="tabs">
    <button class="tab-btn on" onclick="goPage('dashboard',this)">Dashboard</button>
    <button class="tab-btn" onclick="goPage('achats',this)">Mes achats</button>
    <button class="tab-btn" onclick="goPage('ventes',this)">Mes ventes</button>
    <button class="tab-btn" onclick="goPage('watch',this)">Surveillance</button>
  </div>
  <div class="nav-r">
    <span class="nav-time" id="nav-time"></span>
    <button class="btn-ref" onclick="refreshAll()">&#8635; Actualiser</button>
  </div>
</nav>

<!-- DASHBOARD -->
<div class="page on" id="page-dashboard">
  <div class="hero">
    <div class="hero-lbl">Patrimoine financier</div>
    <div class="hero-val" id="h-val">0.00 <span class="cur">&#8364;</span></div>
    <div class="hero-row">
      <span class="badge bm" id="h-pv">+&#8364;0.00</span>
      <span class="badge bm" id="h-pct">+0.00%</span>
      <span class="hero-sub" id="h-since"></span>
    </div>
  </div>

function dbSearch(q){
  const s=q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  if(!s) return [];
  return DB.filter(([t,n])=>{

  }).slice(0,8);
}

];

async function fetchY(url){
  for(const px of PROXIES){
    try{
      const r=await fetch(px(url),{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const t=await r.text();
      if(!t||t.length<20||t.trim()[0]==='<') continue;
      return JSON.parse(t);
    }catch(e){}
  }
  return null;
}

// Devises par suffixe de ticker — Yahoo Finance est parfois faux
function getCurrencyFromTicker(ticker, yahooCurrency){
  const t = ticker.toUpperCase();
  // Suffixes boursiers → devise certaine
  if(/\.(PA|BR|AS|MI|DE|BE|LS|MC|VX|ST|OL|HE|CO|NX)$/.test(t)) return 'EUR';
  if(/\.L$/.test(t)) return 'GBP';
  if(/\.SW$/.test(t)) return 'CHF';
  if(/\.T$/.test(t))  return 'JPY';
  if(/\.TO$/.test(t)) return 'CAD';
  if(/\.AX$/.test(t)) return 'AUD';
  if(/\.HK$/.test(t)) return 'HKD';
  // Crypto / futures
  if(t.endsWith('-USD')) return 'USD';
  if(t.endsWith('=F') || t.endsWith('=X')) return 'USD';
  // Yahoo renvoie la bonne devise pour la plupart des tickers non-ambigus
  // On lui fait confiance si ce n'est pas vide
  if(yahooCurrency && yahooCurrency !== '') return yahooCurrency;
  return 'USD';
}

async function getPrice(ticker){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=6mo`;
  const d=await fetchY(url);
  if(!d) return null;
  const meta=d?.chart?.result?.[0]?.meta;
  if(!meta) return null;
  const closes=(d.chart.result[0].indicators?.quote?.[0]?.close||[]).filter(x=>x!=null);
  const price=meta.regularMarketPrice;
  const prev=meta.chartPreviousClose||meta.previousClose||price;
  return{
    price,chg:prev?((price-prev)/prev*100):0,
    name:meta.longName||meta.shortName||ticker,
    currency:getCurrencyFromTicker(ticker, meta.currency),
    history:closes,
    high52:meta.fiftyTwoWeekHigh,low52:meta.fiftyTwoWeekLow,
  };
}

    ));
  } catch(e){

function setPer(p,btn){
  PERIOD=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');

function sliceH(h){
  if(!h?.length) return [];
  const n={'1W':7,'1M':22,'3M':66,'6M':130,'1Y':252}[PERIOD]||22;
  return h.slice(-Math.min(n,h.length));
}

const CH={};
function killChart(id){if(CH[id]){CH[id].destroy();delete CH[id];}}

const CHART_DEFAULTS={

// ── DASHBOARD ──────────────────────────────────────
function renderDash(){
  let inv=0,val=0;
  POS.forEach(p=>{const r=rt(p.currency||'EUR');inv+=p.pru*p.qty*r;val+=p.price*p.qty*r;});
  const lat=val-inv,latP=inv>0?(lat/inv)*100:0;
  const realPnl=SALES.reduce((s,x)=>s+x.pnl*rt(x.currency||'EUR'),0);
  const total=lat+realPnl;
  const cagr=calcCAGR(inv,val,POS.map(p=>p.date).sort()[0]);

  document.getElementById('h-val').innerHTML=fmt(val)+' <span class="cur">\u20AC</span>';
  const pvEl=document.getElementById('h-pv');
  pvEl.textContent=(lat>=0?'+\u20AC':'-\u20AC')+fmt(Math.abs(lat));
  pvEl.className='badge '+(lat>=0?'bg':'br');
  const pctEl=document.getElementById('h-pct');
  pctEl.textContent=(latP>=0?'+':'')+fmt(latP)+'%';
  pctEl.className='badge '+(latP>=0?'bg':'br');
  const fd=POS.map(p=>p.date).sort()[0];
  if(fd){const days=Math.floor((new Date()-new Date(fd))/86400000);document.getElementById('h-since').textContent='depuis '+days+'j';}

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="ml">Capital investi</div><div class="mv">\u20AC${fmt(inv)}</div></div>
    <div class="metric"><div class="ml">Valorisation</div><div class="mv">\u20AC${fmt(val)}</div></div>
    <div class="metric"><div class="ml">PV/MV latentes</div><div class="mv ${cl(lat)}">${sg(lat)}\u20AC${fmt(Math.abs(lat))}</div><div class="ms ${cl(latP)}">${sg(latP)}${fmt(Math.abs(latP))}%</div></div>
    <div class="metric"><div class="ml">PV/MV realisees</div><div class="mv ${cl(realPnl)}">${sg(realPnl)}\u20AC${fmt(Math.abs(realPnl))}</div></div>
    <div class="metric"><div class="ml">P&L total</div><div class="mv ${cl(total)}">${sg(total)}\u20AC${fmt(Math.abs(total))}</div></div>
    ${cagr!==null?`<div class="metric"><div class="ml">CAGR</div><div class="mv ${cl(cagr)}">${sg(cagr)}${fmt(Math.abs(cagr))}%</div></div>`:''}
  `;

  renderMainChart();
  renderPosCards();
  renderAllocBars(val);
  renderPnlChart();
}

function renderMainChart(){
  killChart('c-main');
  const canvas=document.getElementById('c-main');
  if(!canvas) return;
  if(!POS.length){
    const ctx=canvas.getContext('2d');canvas.width=canvas.parentElement.offsetWidth||600;canvas.height=200;ctx.clearRect(0,0,canvas.width,200);
    ctx.fillStyle='#c8c8c2';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('Ajoutez des positions pour voir la courbe',canvas.width/2,100);return;
  }
  // Build daily patrimoine from histories
  const hists=POS.map(p=>sliceH(p.history));
  const maxLen=Math.max(...hists.map(h=>h.length),0);
  if(maxLen<2){
    const ctx=canvas.getContext('2d');canvas.width=canvas.parentElement.offsetWidth||600;canvas.height=200;ctx.clearRect(0,0,canvas.width,200);
    ctx.fillStyle='#9a9a94';ctx.font='13px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('Cliquez Actualiser pour charger l\u2019historique',canvas.width/2,100);return;
  }
  const data=[];
  for(let i=0;i<maxLen;i++){
    let dv=0;
    POS.forEach((p,pi)=>{
      const h=hists[pi];
      const price=h.length>0?h[Math.round(i*(h.length-1)/Math.max(maxLen-1,1))]:p.price;
      dv+=(price||p.price)*p.qty*rt(p.currency||'EUR');
    });
    data.push(parseFloat(dv.toFixed(2)));
  }
  const isUp=data[data.length-1]>=data[0];
  const col=isUp?'#16a34a':'#dc2626';
  CH['c-main']=new Chart(canvas,{
    type:'line',
    data:{labels:data.map(()=>''),datasets:[{data,borderColor:col,backgroundColor:isUp?'rgba(22,163,74,0.07)':'rgba(220,38,38,0.06)',fill:true,tension:0.4,pointRadius:0,borderWidth:2}]},
    options:{...CHART_DEFAULTS,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',titleColor:'#111',bodyColor:'#4a4a46',borderColor:'#e8e8e4',borderWidth:1,callbacks:{label:c=>' \u20AC'+fmt(c.raw)}}},
      scales:{x:{display:false},y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:v=>'\u20AC'+Math.round(v),color:'#9a9a94',font:{size:11}},border:{display:false}}}}
  });
}

function renderPosCards(){

  renderSparklines();

function renderSparklines(){
  POS.forEach(p=>{
    const c=document.getElementById('sp-'+p.id);
    if(!c) return;
    const h=sliceH(p.history).filter(x=>x!=null);
    const W=180,H=36,ctx=c.getContext('2d');
    ctx.clearRect(0,0,W,H);
    if(h.length<2){ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.strokeStyle='#e8e8e4';ctx.lineWidth=1;ctx.stroke();return;}
    const mn=Math.min(...h),mx=Math.max(...h),rng=mx-mn||1;
    const x=i=>(i/(h.length-1))*(W-2)+1;
    const y=v=>H-2-((v-mn)/rng)*(H-4);
    const col=p.price>=p.pru?'#16a34a':'#dc2626';
    ctx.beginPath();ctx.moveTo(x(0),y(h[0]));
    h.forEach((v,i)=>{if(i>0)ctx.lineTo(x(i),y(v));});
    ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
    ctx.fillStyle=p.price>=p.pru?'rgba(22,163,74,0.09)':'rgba(220,38,38,0.09)';ctx.fill();
  });
}

// ── HELPERS ────────────────────────────────────────
function calcCAGR(inv,val,fd){
  if(!fd||inv<=0||val<=0) return null;
  const y=(new Date()-new Date(fd))/31557600000;
  if(y<0.05) return null;
  return(Math.pow(val/inv,1/y)-1)*100;
}

function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast on '+(type||'');
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3000);
}

  if(btn)btn.classList.add('on');
  if(id==='dashboard')renderDash();
  if(id==='achats')renderPosTable();
  if(id==='ventes')renderSaleTable();
  if(id==='watch')renderWatchGrid();
}

  document.getElementById('m-price').textContent = w.price>0 ? fmt(w.price) : '—';
  const chgEl = document.getElementById('m-chg');
  chgEl.textContent = w.chg!=null ? (w.chg>=0?'+':'')+fmt(Math.abs(w.chg))+'%' : '—';
  chgEl.className   = 'badge ' + (w.chg>0?'bg':w.chg<0?'br':'bm');

  document.querySelectorAll('.mpbtn').forEach((b,i)=>b.classList.toggle('on',i===1));

  document.getElementById('m-kpis').innerHTML   = '<div class="loading-dots"><span class="ld"></span><span class="ld"></span><span class="ld"></span> Chargement…</div>';
  document.getElementById('m-news').innerHTML   = '<div class="loading-dots"><span class="ld"></span><span class="ld"></span><span class="ld"></span> Actualités…</div>';
  killChart('c-modal');

  document.getElementById('modal-overlay').classList.add('on');
  document.body.style.overflow = 'hidden';

  loadModal(w);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('on');
  document.body.style.overflow = '';
  killChart('c-modal');
}

function setMP(p, btn){
  mPeriod = p;
  document.querySelectorAll('.mpbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  drawMChart();
  updateModalPct();
}

function updateModalPct(){
  const h = sliceMH(mHistory).filter(x=>x!=null);
  const chgEl = document.getElementById('m-chg');
  if(h.length >= 2){
    const pct = (h[h.length-1] - h[0]) / h[0] * 100;
    chgEl.textContent = (pct>=0?'+':'') + fmt(Math.abs(pct)) + '%';
    chgEl.className   = 'badge ' + (pct>=0?'bg':'br');
  } else if(mWatch){
    // Fallback: use the 1-day chg
    const c = mWatch.chg;
    chgEl.textContent = c!=null ? (c>=0?'+':'')+fmt(Math.abs(c))+'%' : '—';
    chgEl.className   = 'badge ' + (c>0?'bg':c<0?'br':'bm');
  }
}

function sliceMH(h){
  if(!h?.length) return [];
  const n={'1W':7,'1M':22,'3M':66,'6M':130,'1Y':252}[mPeriod]||22;
  return h.slice(-Math.min(n,h.length));
}

async function loadModal(w){
  const [priceD, newsD] = await Promise.all([
    fetchY(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(w.ticker)}?interval=1d&range=6mo`),
    fetchY(`https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(w.ticker)}&quotesCount=0&newsCount=8`),
  ]);

  // Price history + KPIs
  if(priceD?.chart?.result?.[0]){
    const res = priceD.chart.result[0];
    mHistory = (res.indicators?.quote?.[0]?.close||[]).filter(x=>x!=null);
    const m = res.meta||{};
    document.getElementById('m-kpis').innerHTML = [
      {l:'+ haut 52 sem.', v: m.fiftyTwoWeekHigh ? fmt(m.fiftyTwoWeekHigh) : '—'},
      {l:'+ bas 52 sem.',  v: m.fiftyTwoWeekLow  ? fmt(m.fiftyTwoWeekLow)  : '—'},
      {l:'Devise',         v: m.currency || getCurrencyFromTicker(w.ticker, '')},
    ].map(k=>`<div class="mkpi"><div class="mkpi-l">${k.l}</div><div class="mkpi-v">${k.v}</div></div>`).join('');
  } else {
    document.getElementById('m-kpis').innerHTML = '<div style="color:var(--muted);font-size:12px;padding:.5rem 0;grid-column:1/-1;">Données indisponibles — clique Actualiser</div>';
  }
  drawMChart();
  updateModalPct();

  // News
  const news = newsD?.news?.slice(0,6)||[];
  document.getElementById('m-news').innerHTML = news.length
    ? news.map(n=>{
        const d = n.providerPublishTime
          ? new Date(n.providerPublishTime*1000).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})
          : '';
        return `<div class="news-item">
          <a class="news-ititle" href="${n.link}" target="_blank" rel="noopener">${n.title}</a>
          <div class="news-imeta">
            <span class="news-src">${n.publisher||''}</span>
            <span class="news-date">${d}</span>
            <a class="news-link" href="${n.link}" target="_blank" rel="noopener">↗ Lire</a>
          </div>
        </div>`;
      }).join('')
    : '<div style="color:var(--muted);font-size:12px;padding:.5rem 0;">Aucune actualité disponible.</div>';
}

function drawMChart(){
  killChart('c-modal');
  const canvas = document.getElementById('c-modal');
  if(!canvas) return;
  const h = sliceMH(mHistory).filter(x=>x!=null);
  if(h.length < 2){
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.clientWidth||700,240);
    ctx.fillStyle='#9a9a94';ctx.font='13px Inter';ctx.textAlign='center';
    ctx.fillText('Cliquez Actualiser puis rouvrez pour voir le graphique',(canvas.clientWidth||700)/2,120);
    return;
  }
  const isUp = h[h.length-1]>=h[0];
  const col  = isUp?'#16a34a':'#dc2626';
  CH['c-modal'] = new Chart(canvas,{
    type:'line',
    data:{labels:h.map(()=>''),datasets:[{
      data:h,borderColor:col,
      backgroundColor:isUp?'rgba(22,163,74,0.08)':'rgba(220,38,38,0.07)',
      fill:true,tension:0.35,pointRadius:0,borderWidth:2,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#fff',titleColor:'#0d0d0c',bodyColor:'#3a3a36',borderColor:'#e2e2dc',borderWidth:1,callbacks:{label:c=>' '+fmt(c.raw)}}
      },
      scales:{
        x:{display:false},
        y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{callback:v=>fmt(v),color:'#7a7a74',font:{size:11}},border:{display:false}}
      }
    }
  });
}

</script>
